name: apix-sdk-node baseline

on:
  push:
  pull_request:

jobs:
  apix-sdk-node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apix-sdk-node
    env:
      NPM_CONFIG_CACHE: ${{ github.workspace }}/.npm-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Pack dry run
        run: npm pack --dry-run
